appId: com.dereck.claudebuddy
productName: Claude Buddy
directories:
  output: release
# Don't rebuild native modules — bufferutil/utf-8-validate are optional perf
# deps of `ws` (msedge-tts); the JS fallback works fine.
npmRebuild: false
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: assets/sprites
    to: sprites
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/sprites/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Claude Buddy
publish:
  # Pra ativar auto-update, troque por seu provider:
  # provider: github
  # owner: seu-usuario
  # repo: claude-buddy
  # OU generic:
  # provider: generic
  # url: https://meudominio.com/updates/
  provider: generic
  url: https://example.com/claude-buddy-updates/
